services:
  postgres:
    image: postgres:16
    container_name: commerce-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: commerce-redis-dev
    ports:
      - "6380:6379"

volumes:
  pgdata:
