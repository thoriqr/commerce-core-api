name: CI

on:
  pull_request:
    branches: [main]

  push:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest

    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: commerce_test
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/commerce_test
      JWT_ACCESS_SECRET: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            nc -z localhost 5432 && exit 0
            sleep 2
          done
          exit 1

      - run: npm run migrate:test
      - run: npm test
