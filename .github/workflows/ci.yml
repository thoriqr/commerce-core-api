name: CI

on:
  pull_request:
    branches: [main]

  push:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest

    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true

    services:
      postgres:
        image: postgres:17
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: commerce_test
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/commerce_test
      JWT_ACCESS_SECRET: test
      API_URL: http://localhost:3000
      CLIENT_ORIGINS: http://localhost:3000
      ADMIN_ORIGIN: http://localhost:3000
      STOREFRONT_ORIGIN: http://localhost:3000
      REDIS_URL: redis://localhost:6379
      R2_ACCOUNT_ID: test
      R2_ACCESS_KEY_ID: test
      R2_SECRET_ACCESS_KEY: test
      R2_BUCKET_NAME: test
      GOOGLE_CLIENT_ID: test
      SUPER_EMAIL: admin@test.local
      SUPER_PASSWORD: test
      DEMO_EMAIL: demo@test.local
      DEMO_PASSWORD: test
      RAJAONGKIR_API_KEY: test
      MIDTRANS_SERVER_KEY: test
      NOTIFICATION_WEBHOOK_URL: http://localhost
      BREVO_API_KEY: test
      SCHEDULER_DRIVER: cron

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            nc -z localhost 5432 && exit 0
            sleep 2
          done
          exit 1

      - run: npm run migrate:test
      - run: npm test
